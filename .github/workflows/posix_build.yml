name: posix_build

on:
  workflow_call:
    inputs:
      runner_image:
        required: true
        type: string

      build_type:
        required: true
        type: string

jobs:
  posix_build:
    runs-on: ${{ inputs.runner_image }}

    steps:
      - name: Clone the source code
        uses: actions/checkout@v4

      - name: Install Rust
        working-directory: ./.github/workflows/scripts
        run: |
          ./install_rust.sh

      - name: Setup the command line build arguments
        id: build_type
        run: |
          if [[ "${{ matrix.build_type }}" == "Release" ]]; then
            echo "VALUE=--release" >> $GITHUB_OUTPUT
          fi

      - name: Build the project
        run: |
          cargo build --release --target x86_64-unknown-linux-musl

          if ldd -d "target/x86_64-unknown-linux-musl/release/devshell" 2>&1 | grep -q "statically linked"; then
            echo "Binary is statically linked."
          else
            echo "Error: Binary is not statically linked."
            exit 1
          fi

      - name: Zip the devshell binary
        if: ${{ inputs.build_type == 'Release' }}
        run: |
          ( cd target/x86_64-unknown-linux-musl/release &&
            zip devshell.zip devshell )

      - name: Upload devshell artifact
        if: ${{ inputs.build_type == 'Release' }}
        uses: actions/upload-artifact@v4
        with:
          name: devshell
          path: target/x86_64-unknown-linux-musl/release/devshell.zip